<!DOCTYPE html>
<html>
<head>
    <title>Quick Icon Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin: 20px 0; }
        .icon-item { text-align: center; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #FCA311; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #e8940f; }
        .download-all { font-size: 16px; padding: 15px 30px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Elite Admin Panel - Quick Icon Generator</h1>
        <p><strong>Instructions:</strong> Click "Generate & Download All Icons" to automatically create and download all PWA icons.</p>
        
        <button class="download-all" onclick="generateAndDownloadAll()">
            📱 Generate & Download All Icons
        </button>
        
        <div id="status"></div>
        <div class="icon-grid" id="iconGrid"></div>
    </div>

    <script>
        const sizes = [16,32,72,96,128,144,152,192,384,512];
        
        function generateAndDownloadAll() {
            const status = document.getElementById('status');
            const grid = document.getElementById('iconGrid');
            
            status.innerHTML = '<p style="color: #FCA311; font-weight: bold;">🔄 Generating icons...</p>';
            grid.innerHTML = '';
            
            let completed = 0;
            
            sizes.forEach((size, index) => {
                setTimeout(() => {
                    generateAndDownloadIcon(size);
                    completed++;
                    
                    if (completed === sizes.length) {
                        status.innerHTML = `
                            <div style="background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin: 10px 0;">
                                <h3>✅ All Icons Generated Successfully!</h3>
                                <p><strong>Next Steps:</strong></p>
                                <ol>
                                    <li>All icons have been downloaded to your Downloads folder</li>
                                    <li>Move all icon files to: <code>/public/icons/</code> directory</li>
                                    <li>Refresh your admin panel page</li>
                                    <li>The PWA install popup will appear automatically!</li>
                                </ol>
                                <p><strong>Files to move:</strong> ${sizes.map(s => `icon-${s}x${s}.png`).join(', ')}</p>
                            </div>
                        `;
                    }
                }, index * 200); // Stagger downloads
            });
        }
        
        function generateAndDownloadIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Create gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#FCA311');
            gradient.addColorStop(1, '#14213D');
            
            // Draw rounded rectangle background
            const radius = size * 0.15;
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, radius);
            ctx.fill();
            
            // Add "EA" text
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.2}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('EA', size/2, size/2);
            
            // Create download link
            const link = document.createElement('a');
            link.download = `icon-${size}x${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            // Add to grid for visual feedback
            const iconItem = document.createElement('div');
            iconItem.className = 'icon-item';
            iconItem.innerHTML = `
                <div>${canvas.outerHTML}</div>
                <p>icon-${size}x${size}.png</p>
                <small style="color: green;">✅ Downloaded</small>
            `;
            document.getElementById('iconGrid').appendChild(iconItem);
        }
    </script>
</body>
</html>
