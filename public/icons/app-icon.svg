<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA311;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14213D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E5E5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bgGradient)"/>
  
  <!-- Main Icon - Dashboard/Admin Symbol -->
  <g transform="translate(128, 128)">
    <!-- Dashboard Grid -->
    <rect x="0" y="0" width="80" height="80" rx="12" fill="url(#iconGradient)" opacity="0.9"/>
    <rect x="96" y="0" width="80" height="80" rx="12" fill="url(#iconGradient)" opacity="0.7"/>
    <rect x="192" y="0" width="80" height="80" rx="12" fill="url(#iconGradient)" opacity="0.9"/>
    
    <rect x="0" y="96" width="80" height="80" rx="12" fill="url(#iconGradient)" opacity="0.7"/>
    <rect x="96" y="96" width="176" height="80" rx="12" fill="url(#iconGradient)" opacity="0.9"/>
    
    <rect x="0" y="192" width="176" height="80" rx="12" fill="url(#iconGradient)" opacity="0.8"/>
    <rect x="192" y="192" width="80" height="80" rx="12" fill="url(#iconGradient)" opacity="0.7"/>
  </g>
  
  <!-- Elite Text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">ELITE</text>
  
  <!-- Decorative Elements -->
  <circle cx="80" cy="80" r="8" fill="white" opacity="0.6"/>
  <circle cx="432" cy="80" r="8" fill="white" opacity="0.6"/>
  <circle cx="80" cy="432" r="8" fill="white" opacity="0.6"/>
  <circle cx="432" cy="432" r="8" fill="white" opacity="0.6"/>
</svg>
